<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- Theme detection FIRST to prevent flash -->
  <script>
    (function () {
      const theme = localStorage.getItem('theme');
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      let actualTheme = 'light';
      if (theme === 'dark' || (theme === 'auto' && systemDark) || (!theme && systemDark)) {
        actualTheme = 'dark';
      }
      document.documentElement.setAttribute('data-theme', actualTheme);
      if (actualTheme === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <!-- Preload Critical LCP Image (single, correct tag) -->
  <link rel="preload" as="image"
    href="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=1600&auto=format&fit=crop"
    fetchpriority="high" crossorigin="anonymous">

  <link rel="icon" type="image/png" href="/pwa-icon-192.png" />

  <!-- SEO Meta Tags -->
  <title>GastroMap — Умный гид по ресторанам и ИИ-помощник в выборе еды</title>
  <meta name="description"
    content="GastroMap — ваш персональный ИИ-гид по лучшим заведениям города. Открывайте новые вкусы, бронируйте столики и получайте персональные рекомендации." />
  <meta name="keywords"
    content="рестораны, гастрокарты, гид по еде, рестораны Кракова, ИИ помощник, еда, гастрономия, pwa" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://gastromap.app/" />
  <meta property="og:title" content="GastroMap — Умный гид по ресторанам" />
  <meta property="og:description"
    content="Ваш персональный ИИ-гид по лучшим заведениям города. Открывайте новые вкусы и получайте персональные рекомендации." />
  <meta property="og:image" content="/pwa-icon-512.png" />

  <!-- Twitter -->

  <meta property="twitter:url" content="https://gastromap.app/" />
  <meta property="twitter:title" content="GastroMap — Умный гид по ресторанам" />
  <meta property="twitter:description"
    content="Ваш персональный ИИ-гид по лучшим заведениям города. Открывайте новые вкусы и получайте персональные рекомендации." />
  <meta property="twitter:image" content="/pwa-icon-512.png" />

  <!-- PWA & Apple Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GastroMap" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="mobile-web-app-capable" content="yes" />
</head>
