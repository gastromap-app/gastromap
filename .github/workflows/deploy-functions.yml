name: Deploy Supabase Edge Functions

on:
  push:
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:
    inputs:
      function_name:
        description: 'Function name to deploy (leave empty to deploy all)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all functions
        if: ${{ github.event.inputs.function_name == '' }}
        run: supabase functions deploy --project-ref myyzguendoruefiiufop
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy specific function
        if: ${{ github.event.inputs.function_name != '' }}
        run: |
          supabase functions deploy ${{ github.event.inputs.function_name }} \
            --project-ref myyzguendoruefiiufop
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
