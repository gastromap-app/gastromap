<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Open Design · Discovery Form</title>
<style>
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --text: #111111;
    --muted: #666666;
    --accent: #2563eb;
    --border: #e5e5e5;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 2rem;
  }
  .container { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
  p.lead { color: var(--muted); margin-bottom: 1.5rem; }
  fieldset {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1rem;
    background: var(--surface);
  }
  legend {
    font-weight: 600;
    font-size: 0.875rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0 0.5rem;
  }
  label {
    display: block;
    font-size: 0.875rem;
    margin-bottom: 0.5rem;
    cursor: pointer;
  }
  input[type="radio"] { margin-right: 0.5rem; }
  textarea {
    width: 100%;
    min-height: 80px;
    padding: 0.75rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.9375rem;
    resize: vertical;
  }
  .actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
  }
  button {
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    border: none;
    font-size: 0.9375rem;
    cursor: pointer;
    font-weight: 500;
  }
  button.primary {
    background: var(--accent);
    color: white;
  }
  button.secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
</style>
</head>
<body>
<div class="container">
  <h1>Open Design · Discovery Lock</h1>
  <p class="lead">Answer the five questions before any pixels are written.</p>

  <form>
    <fieldset>
      <legend>1. Surface</legend>
      <label><input type="radio" name="surface" value="desktop-web"> Desktop web page</label>
      <label><input type="radio" name="surface" value="mobile-app"> Mobile app screen</label>
      <label><input type="radio" name="surface" value="deck"> Presentation / deck</label>
      <label><input type="radio" name="surface" value="poster"> Poster / image</label>
      <label><input type="radio" name="surface" value="email"> Email</label>
      <label><input type="radio" name="surface" value="video"> Video / motion</label>
    </fieldset>

    <fieldset>
      <legend>2. Audience</legend>
      <label><input type="radio" name="audience" value="executives"> Executives / investors</label>
      <label><input type="radio" name="audience" value="engineers"> Engineers / developers</label>
      <label><input type="radio" name="audience" value="end-users"> End-users / consumers</label>
      <label><input type="radio" name="audience" value="designers"> Designers / creatives</label>
    </fieldset>

    <fieldset>
      <legend>3. Tone</legend>
      <label><input type="radio" name="tone" value="editorial"> Editorial / quiet luxury</label>
      <label><input type="radio" name="tone" value="playful"> Playful / friendly</label>
      <label><input type="radio" name="tone" value="corporate"> Corporate / authoritative</label>
      <label><input type="radio" name="tone" value="brutal"> Brutalist / experimental</label>
      <label><input type="radio" name="tone" value="soft"> Soft / warm SaaS</label>
      <label><input type="radio" name="tone" value="technical"> Technical / utilitarian</label>
    </fieldset>

    <fieldset>
      <legend>4. Brand context</legend>
      <textarea name="brand" placeholder="Paste brand guide, colors, fonts, logo URL, or write 'none' to use a built-in design system."></textarea>
    </fieldset>

    <fieldset>
      <legend>5. Scale</legend>
      <label><input type="radio" name="scale" value="1"> 1 page / screen / slide</label>
      <label><input type="radio" name="scale" value="3-5"> 3–5 screens</label>
      <label><input type="radio" name="scale" value="10-20"> 10–20 slides</label>
      <label><input type="radio" name="scale" value="single"> Single image / video</label>
    </fieldset>

    <div class="actions">
      <button type="submit" class="primary">Lock brief &rarr;</button>
      <button type="reset" class="secondary">Reset</button>
    </div>
  </form>
</div>
</body>
</html>
