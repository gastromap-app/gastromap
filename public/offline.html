<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GastroMap — Нет соединения</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
      text-align: center;
    }

    .icon {
      font-size: 72px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.95); }
    }

    h1 {
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #f97316, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 15px;
      color: #94a3b8;
      max-width: 320px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px 24px;
      margin-bottom: 12px;
      width: 100%;
      max-width: 320px;
      text-align: left;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #f97316;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-body {
      font-size: 14px;
      color: #cbd5e1;
      line-height: 1.5;
    }

    button {
      margin-top: 20px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    button:active { transform: scale(0.97); opacity: 0.9; }
  </style>
</head>
<body>
  <div class="icon">🌐</div>
  <h1>Нет соединения</h1>
  <p>Восстановите интернет-соединение, чтобы открывать рестораны и получать AI-рекомендации.</p>

  <div class="card">
    <div class="card-title">✅ Доступно офлайн</div>
    <div class="card-body">Ранее просмотренные рестораны и карта сохранены в кэше</div>
  </div>

  <div class="card">
    <div class="card-title">⏳ Требует сети</div>
    <div class="card-body">Поиск, AI-рекомендации и новые локации</div>
  </div>

  <button onclick="window.location.reload()">
    🔄 Попробовать снова
  </button>

  <script>
    // Auto-reload when connection restores
    window.addEventListener('online', () => window.location.href = '/');
  </script>
</body>
</html>
