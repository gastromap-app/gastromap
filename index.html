<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />

  <!-- Theme detection FIRST to prevent flash -->
  <script>
    (function () {
      const theme = localStorage.getItem('theme');
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      let actualTheme = 'light';
      if (theme === 'dark' || (theme === 'auto' && systemDark) || (!theme && systemDark)) {
        actualTheme = 'dark';
      }
      document.documentElement.setAttribute('data-theme', actualTheme);
      if (actualTheme === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/png" href="/pwa-icon-192.png" />

  <!-- SEO Meta Tags -->
  <title>GastroMap — AI-Powered Restaurant Discovery in Poland</title>
  <meta name="description"
    content="GastroMap is your personal AI guide to the best restaurants and food spots in Poland. Discover new flavors, get personalized recommendations, and explore the local food scene." />
  <meta name="keywords"
    content="restaurants, food guide, restaurant finder, Poland restaurants, Krakow food, AI assistant, gastronomy, PWA" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="GastroMap — AI-Powered Restaurant Discovery" />
  <meta property="og:description"
    content="Your personal AI guide to the best restaurants and food spots in Poland. Discover new flavors and get personalized recommendations." />
  <meta property="og:image" content="/pwa-icon-512.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:title" content="GastroMap — AI-Powered Restaurant Discovery" />
  <meta property="twitter:description"
    content="Your personal AI guide to the best restaurants and food spots in Poland. Discover new flavors and get personalized recommendations." />
  <meta property="twitter:image" content="/pwa-icon-512.png" />

  <!-- PWA & Apple Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GastroMap" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#06080a" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="mobile-web-app-capable" content="yes" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
